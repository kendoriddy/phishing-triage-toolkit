{% extends "base.html" %} {% block title %}Register — Phishing Triage{% endblock
%} {% block content %}
<section class="login-page">
  <div class="login-card card">
    <h1>Create account</h1>
    <p class="login-subtitle">
      Team registration requires an invite code from your admin.
    </p>

    <form method="post" class="login-form">
      <label class="field-label" for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        autocomplete="username"
        minlength="3"
        autofocus
      />

      <label class="field-label" for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        autocomplete="new-password"
        minlength="8"
      />

      <label class="field-label" for="confirm_password">Confirm password</label>
      <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        required
        autocomplete="new-password"
        minlength="8"
      />

      <label class="field-label" for="invite_code">Invite code</label>
      <input
        type="text"
        id="invite_code"
        name="invite_code"
        required
        autocomplete="off"
      />

      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <p class="login-footer-link">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</section>
{% endblock %}
